name: Sync from Codeberg

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror Codeberg → GitHub
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --mirror \
            "https://codeberg.org/Fovir/nixos.git" \
            repo.git

          cd repo.git

          git push --mirror \
            "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
